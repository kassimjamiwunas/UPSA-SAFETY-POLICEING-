<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UPSA Safety (Policing) Portal</title>
  <style>

    
    /* ===== Body & Background ===== */
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #1e3c72, #2a5298); /* UPSA theme */
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

     .header-container {
      justify-content: center;
      height: 80vh;
      align-items: center;
      position: relative;
    
      font-weight: 300; 
      
      
    }


    /* ===== Container ===== */
    .container {
      background-color: rgba(66, 66, 68, 0.9);
      padding: 40px;
      border-radius: 12px;
      width: 380px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      text-align: center;
    }

   
    /* ===== Logo ===== */
    .logo {
      width: 80px;
      margin-bottom: 20px;
    }
    h1 {
      justify-content: center;
    }

    h2 {
      color: #ffd700;
      margin-bottom: 25px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    button {
      background-color: #ffd700;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background-color: #ffb800; }

    .message {
      text-align: center;
      margin-top: 12px;
      color: #bcf8ec;
      font-weight: bold;
    }

    .switch-link {
      color: #00ffcc;
      cursor: pointer;
      margin-top: 10px;
      display: block;
      font-size: 13px;
      text-decoration: underline;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  
<div class="container">
  <img src="UPSA logo 1.png" alt="UPSA logo" class="logo"> <!-- Add your logo file here -->

       <div style="font-weight: bold;font-size: 20px;color: #ffd700;">
        <strong>Upsa Safety System </strong>
       </div>

  <!-- ===== Login Form ===== -->
  <form id="loginForm">
    <h2>Login</h2>
    <input id="loginUsername" type="text" placeholder="Username" required>
    <input id="loginPassword" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <span class="switch-link" id="showSignup">Don't have an account? Sign Up</span>
  </form>

  <!-- ===== Signup Form ===== -->
  <form id="signupForm" class="hidden">
    <h2>Sign Up</h2>
    <input id="signupUsername" type="text" placeholder="Username" required>
    <input id="signupPassword" type="password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
    <span class="switch-link" id="showLogin">Already have an account? Login</span>
  </form>

  <div class="message" id="message"></div>
</div>

<script>
  const loginForm = document.getElementById("loginForm");
  const signupForm = document.getElementById("signupForm");
  const message = document.getElementById("message");

  const showSignup = document.getElementById("showSignup");
  const showLogin = document.getElementById("showLogin");

  // ===== Toggle Forms =====
  showSignup.addEventListener("click", () => {
    loginForm.classList.add("hidden");
    signupForm.classList.remove("hidden");
    message.textContent = "";
  });

  showLogin.addEventListener("click", () => {
    signupForm.classList.add("hidden");
    loginForm.classList.remove("hidden");
    message.textContent = "";
  });

  // ===== Login Handler =====
  loginForm.addEventListener("submit", function(e){
    e.preventDefault();
    const username = document.getElementById("loginUsername").value;
    const password = document.getElementById("loginPassword").value;

    fetch("http://localhost:5000/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
      if(data.token){
        localStorage.setItem("token", data.token);
        message.textContent = "Login successful!";
        setTimeout(() => {
          if(data.role === "admin") window.location.href = "admin.html";
          else window.location.href = "report.html";
        }, 800);
      } else {
        message.textContent = data.message;
      }
    })
    .catch(err => message.textContent = "Login error");
  });

  // ===== Signup Handler =====
  signupForm.addEventListener("submit", function(e){
    e.preventDefault();
    const username = document.getElementById("signupUsername").value;
    const password = document.getElementById("signupPassword").value;

    fetch("http://localhost:5000/signup", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
      message.textContent = data.message;
      if(data.success){
        signupForm.classList.add("hidden");
        loginForm.classList.remove("hidden");
      }
    })
    .catch(err => message.textContent = "Signup error");
  });
</script>

</body>
</html>
